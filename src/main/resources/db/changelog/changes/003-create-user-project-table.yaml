databaseChangeLog:
  - changeSet:
      id: 003-create-user-project-table
      author: diego.righi
      changes:
        - createTable:
            tableName: tb_user_project
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: tb_user_project
            columnNames: user_id, project_id
            constraintName: pk_user_project
        - addForeignKeyConstraint:
            baseTableName: tb_user_project
            baseColumnNames: user_id
            referencedTableName: tb_user
            referencedColumnNames: id
            constraintName: fk_user_project_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: tb_user_project
            baseColumnNames: project_id
            referencedTableName: tb_project
            referencedColumnNames: id
            constraintName: fk_user_project_project
            onDelete: CASCADE
