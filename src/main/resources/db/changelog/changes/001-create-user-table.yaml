databaseChangeLog:
  - changeSet:
      id: 001-create-user-table
      author: diego.righi
      changes:
        - createSequence:
            sequenceName: users_seq
            startValue: 1
            incrementBy: 10
        - createTable:
            tableName: tb_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: users_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(129)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_user_email
            tableName: tb_user
            unique: true
            columns:
              - column:
                  name: email
