databaseChangeLog:
  - changeSet:
      id: 002-create-project-table
      author: diego.righi
      changes:
        - createTable:
            tableName: tb_project
            columns:
              - column:
                  name: id
                  type: VARCHAR(200)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
