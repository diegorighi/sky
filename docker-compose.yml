services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skydb
      POSTGRES_USER: skyuser
      POSTGRES_PASSWORD: skypass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyuser -d skydb"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
